<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detection</title>
</head>
<body>

<h1>Emotion Detection using Watson NLP</h1>

<form method="POST">
    <textarea name="text" placeholder="Enter text here"></textarea>
    <button type="submit">Analyze</button>
</form>

{% if emotions %}
    <h3>Result:</h3>
    <p>Joy: {{ emotions.joy }}</p>
    <p>Anger: {{ emotions.anger }}</p>
    <p>Fear: {{ emotions.fear }}</p>
    <p>Sadness: {{ emotions.sadness }}</p>
    <p>Disgust: {{ emotions.disgust }}</p>
{% endif %}

</body>
</html>
