<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detection (Watson NLP)</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>Emotion Detection using IBM Watson NLP</h1>

        <form method="POST">
            <textarea name="text" placeholder="Enter text here..." required></textarea>
            <button type="submit">Analyze Emotion</button>
        </form>

        {% if emotions %}
        <div class="result">
            <h2>Results for:</h2>
            <p>{{ text }}</p>

            <h3>Emotions:</h3>
            <ul>
                <li>Joy: {{ emotions.joy }}</li>
                <li>Anger: {{ emotions.anger }}</li>
                <li>Disgust: {{ emotions.disgust }}</li>
                <li>Sadness: {{ emotions.sadness }}</li>
                <li>Fear: {{ emotions.fear }}</li>
            </ul>
        </div>
        {% endif %}
    </div>

</body>
</html>
